<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeAI</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    width: 90%;
    max-width: 900px;
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

textarea {
    width: 100%;
    height: 120px;
    margin-bottom: 15px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #0f172a;
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg, #6366f1, #8b5cf6);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
}

#result {
    margin-top: 20px;
    background: #020617;
    padding: 15px;
    border-radius: 8px;
    white-space: pre-wrap;
}
</style>

</head>

<body>

<div class="container">
    <h1>🚀 Resume Analyzer</h1>

    <textarea id="resume" placeholder="Paste your resume..."></textarea>

    <textarea id="job" placeholder="Paste job description..."></textarea>

    <button onclick="analyze()">Analyze Resume</button>

    <div id="result"></div>
</div>

<script>
async function analyze() {
    const resume = document.getElementById("resume").value;
    const job = document.getElementById("job").value;

    document.getElementById("result").innerText = "Analyzing... ⏳";

    const res = await fetch("/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            resume: resume,
            job_description: job
        })
    });

    const data = await res.json();

    document.getElementById("result").innerText =
        JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
